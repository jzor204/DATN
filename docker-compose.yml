version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: task_management_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_management
      MYSQL_USER: task_user
      MYSQL_PASSWORD: task_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: task_management_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: task_management_api
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      APP_NAME: task-management
      APP_ENV: docker
      APP_PORT: 8080

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: task_user
      MYSQL_PASSWORD: task_pass
      MYSQL_DATABASE: task_management

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      REDIS_DB: 0

volumes:
  mysql_data: