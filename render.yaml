services:
  - type: web
    name: task-management-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: "task-management"
      - key: APP_ENV
        value: "production"
      - key: RUN_MIGRATIONS_ON_START
        value: "true"
      - key: MIGRATIONS_PATH
        value: "migrations_postgres"
      - key: DB_DRIVER
        value: "postgres"
      - key: DATABASE_URL
        fromDatabase:
          name: task-management-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: task-management-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_HOURS
        value: "24"
      - key: SWAGGER_SCHEMES
        value: "https"

  - type: web
    name: task-management-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  - type: redis
    name: task-management-redis
    plan: free
    ipAllowList: []

databases:
  - name: task-management-db
    plan: free
